<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile</title>
<script>
  (function() {
    var session = localStorage.getItem('auth_session');
    if (!session) {
      window.location.replace('signin.html');
    }
  })();
</script>
<script src="frontend-env.js"></script>
<script src="frontend-api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e242c;
    --border2: #252c36;
    --text: #c8d0da;
    --muted: #4a5568;
    --blue: #5090e0;
    --blue-bg: #0f1828;
    --green: #52c77a;
    --red: #f07060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 22px 12px 40px;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #e7edf7;
  }

  .back-link {
    text-decoration: none;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(17, 20, 24, 0.9);
  }

  .card {
    border: 1px solid var(--border2);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(24, 28, 34, 0.95), rgba(14, 18, 24, 0.96));
    padding: 18px;
  }

  .avatar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #3f5f8f;
    background: linear-gradient(180deg, #3866a5, #24487a);
    color: #e5efff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
  }

  .avatar-sub {
    font-size: 12px;
    color: var(--muted);
  }

  form {
    display: grid;
    gap: 10px;
  }

  label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: rgba(17, 20, 24, 0.9);
    color: var(--text);
    padding: 10px 11px;
    font-size: 13px;
    outline: none;
  }

  input:focus { border-color: var(--blue); }

  input[readonly] {
    opacity: 0.8;
    cursor: not-allowed;
  }

  .actions {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 12px;
    background: rgba(17, 20, 24, 0.9);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .btn.primary {
    border-color: #2b4f84;
    background: linear-gradient(180deg, #204170, #163157);
    color: #e5efff;
  }

  .btn.warn {
    border-color: #8b3a4a;
    color: #ffd7df;
    background: rgba(32, 18, 22, 0.82);
  }

  .message {
    min-height: 16px;
    font-size: 12px;
    margin-top: 8px;
  }

  .message.ok { color: var(--green); }
  .message.err { color: var(--red); }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Profile</div>
      <a class="back-link" href="index.html">Back To Checklist</a>
    </div>

    <section class="card">
      <div class="avatar-wrap">
        <div class="avatar" id="profile-avatar">A</div>
        <div>
          <div id="profile-display-name">Trader</div>
          <div class="avatar-sub">Manage your account details</div>
        </div>
      </div>

      <form id="profile-form">
        <div>
          <label for="profile-name">Name</label>
          <input id="profile-name" type="text" maxlength="120" required/>
        </div>

        <div>
          <label for="profile-email">Email</label>
          <input id="profile-email" type="email" maxlength="160" placeholder="you@example.com"/>
        </div>

        <div>
          <label for="profile-username">Username</label>
          <input id="profile-username" type="text" readonly/>
        </div>

        <div class="actions">
          <button id="profile-save" class="btn primary" type="submit">Save Profile</button>
          <button class="btn warn" type="button" onclick="signOutFromProfile()">Sign Out</button>
        </div>
      </form>
      <div id="profile-message" class="message"></div>
    </section>
  </div>

<script>
  function setMessage(text, isError) {
    const el = document.getElementById('profile-message');
    if (!el) return;
    el.textContent = text || '';
    el.className = 'message ' + (isError ? 'err' : 'ok');
  }

  function updateAvatar(name) {
    const display = String(name || '').trim() || 'Trader';
    const avatar = document.getElementById('profile-avatar');
    const label = document.getElementById('profile-display-name');
    if (avatar) avatar.textContent = display.slice(0, 1).toUpperCase();
    if (label) label.textContent = display;
  }

  function setFormUser(user) {
    const safeUser = user && typeof user === 'object' ? user : {};
    document.getElementById('profile-name').value = safeUser.name || '';
    document.getElementById('profile-email').value = safeUser.email || '';
    document.getElementById('profile-username').value = safeUser.username || '';
    updateAvatar(safeUser.name || safeUser.username || 'Trader');
  }

  async function loadProfile() {
    const result = await FrontendAPI.getCurrentUser();
    const user = result && result.user ? result.user : null;
    if (!user) {
      throw new Error('Could not load user profile');
    }

    setFormUser(user);

    const currentSession = FrontendAPI.getSession() || {};
    FrontendAPI.setSession(Object.assign({}, currentSession, {
      name: user.name || currentSession.name || '',
      username: user.username || currentSession.username || '',
      userId: user.id || currentSession.userId || ''
    }));
  }

  async function signOutFromProfile() {
    try {
      await FrontendAPI.logout();
    } catch (err) {
      FrontendAPI.clearSession();
    }
    window.location.replace('signin.html');
  }

  document.getElementById('profile-form').addEventListener('submit', async function (event) {
    event.preventDefault();
    const saveBtn = document.getElementById('profile-save');
    const name = document.getElementById('profile-name').value.trim();
    const email = document.getElementById('profile-email').value.trim();

    if (!name) {
      setMessage('Name is required.', true);
      return;
    }

    saveBtn.disabled = true;
    try {
      const result = await FrontendAPI.updateProfile({ name: name, email: email });
      const user = result && result.user ? result.user : null;
      if (!user) {
        throw new Error('Profile update failed');
      }

      setFormUser(user);
      const currentSession = FrontendAPI.getSession() || {};
      FrontendAPI.setSession(Object.assign({}, currentSession, {
        name: user.name || currentSession.name || '',
        username: user.username || currentSession.username || '',
        userId: user.id || currentSession.userId || ''
      }));

      setMessage('Profile updated successfully.', false);
    } catch (err) {
      setMessage(err && err.message ? err.message : 'Could not update profile.', true);
    } finally {
      saveBtn.disabled = false;
    }
  });

  loadProfile().catch(function (err) {
    setMessage(err && err.message ? err.message : 'Could not load profile.', true);
  });
</script>
</body>
</html>
