<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Account Setup</title>
<script src="frontend-env.js"></script>
<script src="frontend-api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #252c36;
    --text: #c8d0da;
    --muted: #4a5568;
    --blue: #5090e0;
    --green: #52c77a;
    --red: #f07060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 20%, #13203a 0%, var(--bg) 45%), var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: grid;
    place-items: center;
    padding: 20px;
  }

  .card {
    width: min(460px, 100%);
    background: linear-gradient(180deg, rgba(24, 28, 34, 0.95), rgba(17, 20, 24, 0.95));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
  }

  .title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #e7edf7;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
    line-height: 1.45;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aab8cc;
    margin-bottom: 14px;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: rgba(17, 20, 24, 0.7);
  }

  label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 10px 0 6px;
  }

  input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    padding: 11px 12px;
    font-size: 13px;
    outline: none;
  }

  input:focus { border-color: var(--blue); }

  input[readonly] {
    opacity: 0.8;
  }

  button {
    width: 100%;
    margin-top: 14px;
    border: 1px solid #2b4f84;
    border-radius: 9px;
    background: linear-gradient(180deg, #204170, #163157);
    color: #e5efff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px;
    cursor: pointer;
  }

  button:disabled { opacity: 0.6; cursor: wait; }

  .message {
    margin-top: 12px;
    font-size: 12px;
    min-height: 18px;
  }

  .ok { color: var(--green); }
  .err { color: var(--red); }

  .demo {
    margin-top: 12px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .support {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .support a {
    color: #9ec3ff;
    text-decoration: none;
    border-bottom: 1px dotted #446ea8;
  }

  .support a:hover {
    color: #c8deff;
  }
</style>
</head>
<body>
  <main class="card">
    <h1 class="title">Create Login</h1>
    <p class="subtitle">Finish setting up a local username and password so you can sign in later without Google.</p>

    <div id="mode-meta" class="meta"></div>

    <form id="setup-form">
      <label for="setup-username">Username</label>
      <input id="setup-username" type="text" autocomplete="username" required/>

      <label for="setup-password">Password</label>
      <input id="setup-password" type="password" autocomplete="new-password" required/>

      <label for="setup-confirm-password">Confirm Password</label>
      <input id="setup-confirm-password" type="password" autocomplete="new-password" required/>

      <button id="setup-btn" type="submit">Save Login</button>
    </form>

    <div id="message" class="message"></div>

    <div class="demo">
      Choose a username and password now. Your Google account stays linked to the same user.
    </div>

    <div class="support">
      Need help? Contact <a id="support-link" href="mailto:support@example.com">support@example.com</a>.
    </div>
  </main>

<script>
  const env = window.APP_ENV || {};
  const form = document.getElementById('setup-form');
  const msg = document.getElementById('message');
  const btn = document.getElementById('setup-btn');
  const modeMeta = document.getElementById('mode-meta');
  const supportLink = document.getElementById('support-link');
  const params = new URLSearchParams(String(window.location.hash || '').replace(/^#/, ''));
  const session = {
    mode: params.get('mode') || '',
    userId: params.get('userId') || '',
    username: params.get('username') || '',
    name: params.get('name') || '',
    email: params.get('email') || '',
    token: params.get('token') || '',
    refreshToken: params.get('refreshToken') || ''
  };

  function setMessage(text, isError) {
    msg.textContent = text;
    msg.className = 'message ' + (isError ? 'err' : 'ok');
  }

  function saveSession(payload) {
    if (window.FrontendAPI && FrontendAPI.setSession) {
      FrontendAPI.setSession(payload);
      return;
    }

    localStorage.setItem('auth_session', JSON.stringify(payload));
  }

  function hasSession() {
    return session.mode === 'api' && session.token && session.refreshToken;
  }

  function restoreSession() {
    if (!hasSession()) return false;
    saveSession(session);
    window.history.replaceState({}, document.title, window.location.pathname + window.location.search);
    return true;
  }

  function ensureApiMode() {
    if (!(window.FrontendAPI && FrontendAPI.enableApiMode)) return Promise.resolve();
    return FrontendAPI.enableApiMode();
  }

  function updateModeUi() {
    modeMeta.textContent = 'Mode: Backend API at ' + (env.API_BASE_URL || 'http://localhost:3000');

    if (supportLink) {
      const supportEmail = String(env.SUPPORT_EMAIL || 'support@example.com').trim();
      supportLink.href = 'mailto:' + supportEmail;
      supportLink.textContent = supportEmail;
    }
  }

  if (!restoreSession()) {
    window.location.href = 'signin.html';
  }

  updateModeUi();
  if (document.getElementById('setup-username')) {
    document.getElementById('setup-username').value = session.username || '';
  }

  form.addEventListener('submit', async function (event) {
    event.preventDefault();
    setMessage('', false);

    const username = document.getElementById('setup-username').value.trim().toLowerCase();
    const password = document.getElementById('setup-password').value;
    const confirmPassword = document.getElementById('setup-confirm-password').value;

    if (!username || !password || !confirmPassword) {
      setMessage('Please complete the username and password fields.', true);
      return;
    }

    btn.disabled = true;
    try {
      await ensureApiMode();

      const nextSession = window.FrontendAPI && FrontendAPI.setCredentials
        ? await FrontendAPI.setCredentials({ username: username, password: password, confirmPassword: confirmPassword })
        : null;

      if (!nextSession) {
        throw new Error('Frontend API helper is not loaded');
      }

      saveSession(nextSession);
      setMessage('Login created successfully.', false);
      window.location.href = 'index.html';
    } catch (error) {
      setMessage(error.message || 'Could not save login credentials.', true);
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
